apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberaware-deployment
  namespace: dev 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-test
  template:
    metadata:
      labels:
        app: web-test
    spec:
      containers:
      - name: cyberaware-container
        image: ton-username/cyberaware:v1 # <--- REMPLACE 'ton-username' PAR TON PSEUDO DOCKER HUB
        ports:
        - containerPort: 3000 # <--- Next.js écoute ici
---
apiVersion: v1
kind: Service
metadata:
  name: svc-nginx
  namespace: dev
spec:
  selector:
    app: web-test
  ports:
    - protocol: TCP
      port: 80 # Le port que l'Ingress utilise (on ne change pas ici)
      targetPort: 3000 # <--- ON DIT AU SERVICE D'ENVOYER VERS LE 3000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: dev
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: svc-nginx
            port:
              number: 80